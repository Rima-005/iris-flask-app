<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iris Flower Classification</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <div class="card shadow-lg p-5 mt-5">


        <h1 class="text-center mb-3">
    🌸 Iris Flower Classification
</h1>

<p class="text-center text-muted">
    Predict the species of an Iris flower using a trained Logistic Regression model.
</p>

<div class="text-center mb-4">
    <span class="badge bg-success fs-6">Model: Logistic Regression</span>
    <span class="badge bg-primary fs-6">Accuracy: 96.67%</span>
</div>

<form action="/predict" method="POST">

        

            <div class="mb-3">
                <label class="form-label">Sepal Length (cm)</label>
                <input type="number" step="any" class="form-control" name="sepal_length" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Sepal Width (cm)</label>
                <input type="number" step="any" class="form-control" name="sepal_width" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Petal Length (cm)</label>
                <input type="number" step="any" class="form-control" name="petal_length" required>
            </div>

            <div class="mb-4">
                <label class="form-label">Petal Width (cm)</label>
                <input type="number" step="any" class="form-control" name="petal_width" required>
            </div>

            <div class="text-center">
                <button class="btn btn-success btn-lg">
                    🌸 Predict Species
                </button>
            </div>

        </form>

    </div>

</div>

</body>

</html>
